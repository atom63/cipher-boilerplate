<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
    <link rel="icon" type="image/png" href="/favicons/favicon.png">
    <link rel="apple-touch-icon" href="/favicons/apple-touch-icon.png">

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Brawler:wght@400;700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <!-- Prevent FOUC: apply theme class before first paint -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        var d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(d ? 'dark' : 'light');
      })();
    </script>

    <!-- Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="f2718eaa-9768-40aa-b45e-237544b2bf85"></script>

    <!-- Base Title (will be updated by usePageMeta) -->
    <title>Cipher</title>

    <!-- Base Meta Tags (will be updated by usePageMeta) -->
    <meta
      name="description"
      content="Design tokens from Figma to production CSS in one click."
    >

    <!-- Prevent pull-to-refresh and overscroll on mobile -->
    <style>
    html {
      overscroll-behavior: none;
    }

    body {
      overscroll-behavior: none;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
    }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
